name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create bin directory
        run: mkdir -p bin/darwin
      
      - name: Build macOS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create bin directory
        run: mkdir bin\win32
        shell: cmd
      
      - name: Build Windows
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe
          retention-days: 5

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts/win
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UnblockPro ${{ github.ref_name }}
          body: |
            ## UnblockPro ${{ github.ref_name }}
            
            ### Скачать
            
            | Платформа | Файл | Описание |
            |-----------|------|----------|
            | **macOS** Apple Silicon (M1/M2/M3/M4) | `UnblockPro-*-mac-arm64.zip` | Для Mac с M-процессором |
            | **macOS** Intel | `UnblockPro-*-mac-x64.zip` | Для Mac с Intel |
            | **Windows** | `UnblockPro-*-win-setup.exe` | Установщик |
            | **Windows** | `UnblockPro-*-win-portable.exe` | Портативная версия |
            
            ### macOS — первый запуск
            
            После скачивания выполните в Терминале:
            ```
            xattr -cr /Applications/UnblockPro.app
            ```
            
            ---
            **by sonic**
          draft: false
          prerelease: false
          files: |
            artifacts/mac/*
            artifacts/win/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
